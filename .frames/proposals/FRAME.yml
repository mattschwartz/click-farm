name: proposals
description: A frame for the procedure of creating and maintaining proposals.
structure:
  proposals/accepted: >
    This is where proposals live which have already been deliberated and aligned on by all required roles.
  proposals/draft: >
    This is where proposals start. Any role can draft a proposal and assign it to any other role for next steps. Sometimes multiple roles are required before a draft is promoted to accepted.
  proposals/rejected: >
    This is where proposals that are not accepted go which are not being pursued. They are kept for historical reasons in case one needs to understand why a previous decision was discarded.
roles:
  - name: designer
    purpose: Used for making "game feel" decisions. Final say in all game-related matters and can override any other role.
    domain-knowledge: >
      Where is this role an expert? If other roles have questions, they can find other roles which are experts in that area. Knowledge discovery/routing
  - name: engineer
    purpose: Used for writing high quality code.
  - name: architect
    purpose: Used when decomposing large technical problems into concrete implementation details for the engineer to code.

    
